<html>
    <head>
        <title>Personal Profile</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
    <style>
        body {
            font-family: Arial;
            background-color:lavender;
        }
        
        .container{
            width: 500px;
            margin: auto;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        
        h2{
            text-align: center;
            color: darkblue;
        }
        
        input, textarea{
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
        }
        
        input[type=submit]:hover{
            background-color: darkblue;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Personal Profile Form</h2>
        <form action="ProfileServlet" method="post">
            Name: <input type="text" name="name">
            Student ID: <input type="text" name="studentid">
            Program: <input type="text" name="program">
            Email: <input type="email" name="email">
            Hobbies: <input type="text" name="hobbies">
            Self Introduction: <textarea name="intro"></textarea>
            <input type="submit" name="Submit">
            
            
        </form>
    </div>
</body>
</html>
